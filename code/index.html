<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="icon" href="../images/bird_1-a.png" />
    <style>
      :root {
        --pipeColor: radial-gradient(rgb(240, 161, 97) 50%, rgb(139, 96, 1));
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: cursive;
        caret-color: transparent;
        user-select: none;
      }
      .background {
        height: 100vh;
        width: 100vw;
        background: url(../images/background_1.jpg) no-repeat center center
          fixed;
        background-size: cover;
      }
      .bird {
        height: 80px;
        width: 100px;
        position: fixed;
        top: 40vh;
        left: 30vh;
        z-index: 100;
      }

      .pipe_sprite {
        position: fixed;
        top: 40vh;
        left: 100vw;
        height: 70vh;
        width: 6vw;
        background: var(--pipeColor);
        border: 5px solid black;
      }
      .message {
        position: absolute;
        z-index: 10;
        color: black;
        top: 38%;
        left: 50%;
        font-size: 2em;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .messageStyle {
        background: white;
        padding: 30px;
        box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
        border-radius: 10px;
      }
      .score {
        position: fixed;
        z-index: 10;
        height: 10vh;
        font-size: 8vh;
        font-weight: 100;
        color: #dee1ff;
        -webkit-text-stroke-width: 1px;
        -webkit-text-stroke-color: black;
        top: 0;
        left: 0;
        margin: 10px;
        text-align: center;
      }

      .score_val {
        color: gold;
        font-weight: bold;
      }
      .set {
        position: absolute;
        top: 10px;
        right: 10px;
        color: aliceblue;
        width: 40px;
        cursor: pointer;
        z-index: 200;
        box-shadow: 0 4px 3px #0000;
      }
      /* Settings Modal */
      #settingsModal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 10px;
        z-index: 300;
        width: 340px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }
      #settingsModal h2 {
        margin-bottom: 10px;
      }
      .option-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 10px 0;
      }
      .option-grid img {
        width: 120px;
        height: 80px;
        object-fit: cover;
        border: 3px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }
      .option-grid img.selected {
        border: 3px solid dodgerblue;
      }
      .bird-grid img {
        width: 80px;
        height: 60px;
        object-fit: contain;
        background: #f4f4f4;
      }

      #settingsModal button {
        margin-top: 12px;
        padding: 10px 18px;
        cursor: pointer;

        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: #ffffff;
        border: none;
        border-radius: 8px;

        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;

        transition: all 0.25s ease;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      }

      /* Hover effect */
      #settingsModal button:hover {
        background: linear-gradient(135deg, #4338ca, #4f46e5);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
      }

      /* Click effect */
      #settingsModal button:active {
        transform: scale(0.96);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      /* Focus (keyboard accessibility) */
      #settingsModal button:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="background" id="gameBackground"></div>

    <!-- Settings Icon -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="set"
      viewBox="-0.5 -0.5 17 17 "
      onclick="openSettings()"
    >
      <path
        fill="#dee1ff"
        stroke-width=".5"
        stroke="black"
        d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"
      />
    </svg>

    <!-- Settings Modal -->
    <div id="settingsModal">
      <h2>Choose Background</h2>
      <div class="option-grid bg-grid">
        <img src="../images/background_1.jpg" data-bg="1" />
        <img src="../images/background_2.png" data-bg="2" />
        <img src="../images/background_3.png" data-bg="3" />
        <img src="../images/background_4.png" data-bg="4" />
      </div>

      <h2>Choose Bird</h2>
      <div class="option-grid bird-grid">
        <img src="../images/bird_3-a.png" data-bird="1" />
        <img src="../images/bird_2-a.png" data-bird="2" />
        <img src="../images/bird_1-a.png" data-bird="3" />
      </div>

      <p>🏆 Best Score: <span id="bestScore">0</span></p>
      <button onclick="saveSettings()">Save & Start</button>
    </div>

    <img
      src="../images/bird_3-a.png"
      alt="invalid-img"
      class="bird"
      id="bird-1"
    />
    <div class="message"></div>

    <div class="score">
      <span class="score_title"></span>
      <span class="score_val"></span>
    </div>
    <div class="pipe_sprite"></div>

    <script>
      let move_speed = 3,
        grativy = 0.5;
      let bird = document.querySelector(".bird");
      let img = document.getElementById("bird-1");
      let bird_props = bird.getBoundingClientRect();
      let background = document
        .querySelector(".background")
        .getBoundingClientRect();
      let score_val = document.querySelector(".score_val");
      let message = document.querySelector(".message");
      let score_title = document.querySelector(".score_title");
      let game_state = "Start";
      img.style.display = "none";

      // best score
      let bestScore = localStorage.getItem("bestScore") || 0;
      document.getElementById("bestScore").textContent = bestScore;

      // saved preferences
      let currentBird = localStorage.getItem("currentBird") || null;
      let currentBg = localStorage.getItem("currentBg") || null;

      // open settings if first time
      window.onload = function () {
        if (!currentBird || !currentBg) {
          openSettings();
          message.innerHTML = "";
        } else {
          applySelections();
          message.innerHTML =
            'Press Enter to start the game <p>Use <span style="color: #4f46e5; font-weight: 600;">Spacebar</span> to jump</p>';
          message.classList.add("messageStyle");
        }
      };

      // ========== SETTINGS ==========
      function openSettings() {
        document.getElementById("settingsModal").style.display = "block";

        // highlight selected
        document.querySelectorAll(".bg-grid img").forEach((img) => {
          img.classList.toggle("selected", img.dataset.bg === currentBg);
        });
        document.querySelectorAll(".bird-grid img").forEach((img) => {
          img.classList.toggle("selected", img.dataset.bird === currentBird);
        });
      }
      function saveSettings() {
        // selected bg
        let bgEl = document.querySelector(".bg-grid img.selected");
        let birdEl = document.querySelector(".bird-grid img.selected");
        if (bgEl && birdEl) {
          currentBg = bgEl.dataset.bg;
          currentBird = birdEl.dataset.bird;
          localStorage.setItem("currentBg", currentBg);
          localStorage.setItem("currentBird", currentBird);
          applySelections();
          closeSettings();
          message.innerHTML =
            'Press Enter to start the game <p>Use <span style="color: #4f46e5; font-weight: 600;">Spacebar</span> to jump</p>';
          message.classList.add("messageStyle");
        }
      }
      function closeSettings() {
        document.getElementById("settingsModal").style.display = "none";
      }
      function applySelections() {
        let bgDiv = document.getElementById("gameBackground");
        let pipeColor = "";

        if (currentBg == "1") {
          bgDiv.style.backgroundImage = "url('../images/background_1.jpg')";
          pipeColor = "radial-gradient(rgb(240,161,97) 50%,rgb(139,96,1))";
        }
        if (currentBg == "2") {
          bgDiv.style.backgroundImage = "url('../images/background_2.png')";
          pipeColor = "radial-gradient(rgb(97 240 100) 50%, rgb(5 139 1))";
        }
        if (currentBg == "3") {
          bgDiv.style.backgroundImage = "url('../images/background_3.png')";
          pipeColor = "radial-gradient(rgb(219 113 174) 50%, rgb(133 70 106))";
        }
        if (currentBg == "4") {
          bgDiv.style.backgroundImage = "url('../images/background_4.png')";
          pipeColor = "radial-gradient(rgb(87 36 157) 50%, rgb(38 20 73))";
        }

        // set pipe color globally
        document.documentElement.style.setProperty("--pipeColor", pipeColor);

        // bird selection
        if (currentBird == "1") img.src = "../images/bird_3-a.png";
        if (currentBird == "2") img.src = "../images/bird_2-a.png";
        if (currentBird == "3") img.src = "../images/bird_1-a.png";
      }

      // click select highlight
      document.querySelectorAll(".bg-grid img").forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll(".bg-grid img")
            .forEach((i) => i.classList.remove("selected"));
          el.classList.add("selected");
        };
      });
      document.querySelectorAll(".bird-grid img").forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll(".bird-grid img")
            .forEach((i) => i.classList.remove("selected"));
          el.classList.add("selected");
        };
      });

      // ========== GAME ==========
      document.addEventListener("keydown", (e) => {
        if (
          e.key == "Enter" &&
          game_state != "Play" &&
          currentBird &&
          currentBg
        ) {
          document.querySelectorAll(".pipe_sprite").forEach((e) => e.remove());
          img.style.display = "block";
          bird.style.top = "40vh";
          game_state = "Play";
          message.innerHTML = " ";
          score_title.innerHTML = "Score : ";
          score_val.innerHTML = "0";
          message.classList.remove("messageStyle");
          Play();
        }
      });

      function Play() {
        function move() {
          if (game_state != "Play") return;
          let pipe_sprite = document.querySelectorAll(".pipe_sprite");
          pipe_sprite.forEach((element) => {
            let pipe_sprite_props = element.getBoundingClientRect();
            bird_props = bird.getBoundingClientRect();
            if (pipe_sprite_props.right <= 0) {
              element.remove();
            } else {
              if (
                bird_props.left <
                  pipe_sprite_props.left + pipe_sprite_props.width &&
                bird_props.left + bird_props.width > pipe_sprite_props.left &&
                bird_props.top <
                  pipe_sprite_props.top + pipe_sprite_props.height &&
                bird_props.top + bird_props.height > pipe_sprite_props.top
              ) {
                game_state = "End";
                let currentScore = parseInt(score_val.innerHTML);
                if (currentScore > bestScore) {
                  bestScore = currentScore;
                  localStorage.setItem("bestScore", bestScore);
                  document.getElementById("bestScore").textContent = bestScore;
                }
                message.innerHTML =
                  "Game Over".fontcolor("red") + "<br>Press Enter to restart";
                message.classList.add("messageStyle");
                img.style.display = "none";
                return;
              } else {
                if (
                  pipe_sprite_props.right < bird_props.left &&
                  pipe_sprite_props.right + move_speed >= bird_props.left &&
                  element.increase_score == "1"
                ) {
                  score_val.innerHTML = +score_val.innerHTML + 1;
                }
                element.style.left = pipe_sprite_props.left - move_speed + "px";
              }
            }
          });
          requestAnimationFrame(move);
        }
        requestAnimationFrame(move);

        let bird_dy = 0;
        function apply_gravity() {
          if (game_state != "Play") return;
          bird_dy = bird_dy + grativy;
          document.addEventListener("keydown", (e) => {
            if (e.key == " ") {
              if (currentBird == 1) {
                img.src = "../images/bird_3-a.png";
              }
              if (currentBird == 2) {
                img.src = "../images/bird_2-a.png";
              }
              if (currentBird == 3) {
                img.src = "../images/bird_1-a.png";
              }
              bird_dy = -7.6;
            }
          });
          document.addEventListener("keyup", (e) => {
            if (e.key == " ") {
              if (currentBird == 1) {
                img.src = "../images/bird_3-b.png";
              }
              if (currentBird == 2) {
                img.src = "../images/bird_2-b.png";
              }
              if (currentBird == 3) {
                img.src = "../images/bird_1-b.png";
              }
            }
          });
          if (bird_props.top <= 0 || bird_props.bottom >= background.bottom) {

            game_state = "End";
            window.location.reload();
            return;
          }


          
          bird.style.top = bird_props.top + bird_dy + "px";
          bird_props = bird.getBoundingClientRect();
          requestAnimationFrame(apply_gravity);
        }
        requestAnimationFrame(apply_gravity);

        let pipe_sepration = 0;
        let pipe_gap = 35;
        function create_pipe() {
          if (game_state != "Play") return;
          if (pipe_sepration > 115) {
            pipe_sepration = 0;
            let pipe_posi = Math.floor(Math.random() * 43) + 8;
            let pipe_sprite_inv = document.createElement("div");
            pipe_sprite_inv.className = "pipe_sprite";
            pipe_sprite_inv.style.top = pipe_posi - 70 + "vh";
            pipe_sprite_inv.style.left = "100vw";
            document.body.appendChild(pipe_sprite_inv);
            let pipe_sprite = document.createElement("div");
            pipe_sprite.className = "pipe_sprite";
            pipe_sprite.style.top = pipe_posi + pipe_gap + "vh";
            pipe_sprite.style.left = "100vw";
            pipe_sprite.increase_score = "1";
            document.body.appendChild(pipe_sprite);
          }
          pipe_sepration++;
          requestAnimationFrame(create_pipe);
        }
        requestAnimationFrame(create_pipe);
      }
    </script>
  </body>
</html>
